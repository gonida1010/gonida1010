name: Generate Bomberman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: gonida1010
          outputs: |
            dist/bomberman-contribution-graph.svg?palette=github-dark&color_dots=#1e3a8a,#7c3aed,#db2777,#f59e0b,#22c55e&game=bomberman
            dist/bomberman-contribution-graph-dark.svg?palette=github-dark&color_dots=#1e3a8a,#7c3aed,#db2777,#f59e0b,#22c55e&game=bomberman

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}